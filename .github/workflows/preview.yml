name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write # untuk comment preview URL ke PR

jobs:
  preview-api:
    name: Preview — API
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      api_url: ${{ steps.deploy.outputs.api_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy API preview
        id: deploy
        working-directory: apps/api
        run: |
          OUTPUT=$(bunx wrangler deploy \
            --name "commate-api-pr-${{ github.event.pull_request.number }}" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          echo "api_url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          WAKATIME_CLIENT_ID: ${{ secrets.WAKATIME_CLIENT_ID }}
          WAKATIME_CLIENT_SECRET: ${{ secrets.WAKATIME_CLIENT_SECRET }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  preview-web:
    name: Preview — Web
    runs-on: ubuntu-latest
    needs: preview-api
    if: github.event.action != 'closed'
    outputs:
      web_url: ${{ steps.deploy.outputs.web_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & Deploy Web preview
        id: deploy
        working-directory: apps/web
        run: |
          OUTPUT=$(bunx opennextjs-cloudflare build && \
            bunx wrangler deploy \
            --name "commate-web-pr-${{ github.event.pull_request.number }}" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          echo "web_url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_API_URL: ${{ needs.preview-api.outputs.api_url }}

  comment-preview:
    name: Comment Preview URLs
    runs-on: ubuntu-latest
    needs: [preview-api, preview-web]
    if: always() && github.event.action != 'closed'

    steps:
      - name: Comment PR dengan preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const apiUrl = '${{ needs.preview-api.outputs.api_url }}';
            const webUrl = '${{ needs.preview-web.outputs.web_url }}';
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const body = `## 🚀 Preview Deployment

            | Service | URL | Status |
            |---------|-----|--------|
            | 🌐 Web | ${webUrl || '❌ Failed'} | ${webUrl ? '✅ Ready' : '❌ Failed'} |
            | ⚙️ API | ${apiUrl || '❌ Failed'} | ${apiUrl ? '✅ Ready' : '❌ Failed'} |

            **Commit:** \`${sha}\`
            **Branch:** \`${{ github.head_ref }}\`

            > Preview akan otomatis terhapus saat PR di-merge atau di-close.`;

            // Cari comment yang sudah ada dari bot ini
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('🚀 Preview Deployment')
            );

            if (existing) {
              // Update comment yang sudah ada
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              // Buat comment baru
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Delete preview workers
        run: |
          bunx wrangler --cwd apps/api delete \
            --name "commate-api-pr-${{ github.event.pull_request.number }}" \
            --force || true
          bunx wrangler --cwd apps/web delete \
            --name "commate-web-pr-${{ github.event.pull_request.number }}" \
            --force || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
